<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Studio Fisio{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50">
    <!-- Navbar -->
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                    <i class="fas fa-dumbbell mr-3"></i>Studio Fisio
                </h1>
                <a href="{% url 'aulas_list' %}" class="bg-blue-600 text-white px-6 py-2 rounded-xl hover:bg-blue-700">
                    Agendar Aula
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-12">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-12 mt-20">
        <div class="container mx-auto px-6 text-center">
            <p>Studio Fisio Colatina-ES | (27) 99999-9999 | 2026</p>
        </div>
    </footer>
</body>
</html>
