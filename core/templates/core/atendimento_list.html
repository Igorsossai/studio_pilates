<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% extends "core/base.html" %}

{% block content %}
<h2>Atendimentos</h2>
<a href="{% url 'core:atendimento_create' %}">Novo agendamento</a>
<table border="1" cellpadding="5">
    <tr>
        <th>Data</th>
        <th>Hora</th>
        <th>Paciente</th>
        <th>Profissional</th>
        <th>Serviço</th>
        <th>Status</th>
        <th>Valor</th>
    </tr>
    {% for a in atendimentos %}
    <tr>
        <td>{{ a.data }}</td>
        <td>{{ a.hora_inicio }} - {{ a.hora_fim }}</td>
        <td>{{ a.paciente.nome }}</td>
        <td>{{ a.profissional.nome_completo }}</td>
        <td>{{ a.servico.nome }}</td>
        <td>{{ a.get_status_display }}</td>
        <td>R$ {{ a.valor_cobrado|default:"—" }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="7">Nenhum atendimento cadastrado.</td></tr>
    {% endfor %}
</table>
{% endblock %}
        <tr>
    <th>Data</th><th>Hora</th><th>Paciente</th><th>Profissional</th>
    <th>Serviço</th><th>Status</th><th>Valor</th><th>Ações</th>
</tr>
{% for a in atendimentos %}
<tr>
    <td>{{ a.data }}</td>
    <td>{{ a.hora_inicio }} - {{ a.hora_fim }}</td>
    <td>{{ a.paciente.nome }}</td>
    <td>{{ a.profissional.nome_completo }}</td>
    <td>{{ a.servico.nome }}</td>
    <td><strong>{{ a.get_status_display }}</strong></td>
    <td>R$ {{ a.valor_cobrado|default:"—" }}</td>
    <td>
        {% if a.status == "AGENDADO" %}
            <a href="{% url 'core:atendimento_realizado' a.pk %}">Marcar Realizado</a>
        {% endif %}
    </td>
</tr>
{% endfor %}
</title>
</head>
<body>

</body>
</html>
